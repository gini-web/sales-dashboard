<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務案件管理儀表板</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e2e5ea;
    --ink: #1f2430;
    --muted: #6b7280;
    --accent: #2b6cb0;
    --accent-soft: #e8f1fb;
    --warn: #b7791f;
    --warn-soft: #fff6e0;
    --danger: #b3441e;
    --danger-soft: #fdece5;
    --ok: #2f7a4f;
    --ok-soft: #e7f6ec;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
  }

  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    margin: 0;
  }

  header .meta {
    font-size: 12px;
    color: var(--muted);
  }

  nav {
    display: flex;
    gap: 4px;
    padding: 0 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  nav button {
    padding: 12px 16px;
    border: none;
    background: none;
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
  }

  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  main {
    padding: 20px 24px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ---- 漏斗總覽 ---- */
  .funnel {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .funnel-stage {
    flex: 1;
    min-width: 130px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
  }

  .funnel-stage.selected { border-color: var(--accent); background: var(--accent-soft); }

  .funnel-stage .count { font-size: 24px; font-weight: 700; }
  .funnel-stage .label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .funnel-stage.dvs { opacity: 0.85; }

  /* ---- 摘要卡片 ---- */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .summary-card .value { font-size: 20px; font-weight: 700; }
  .summary-card .label { font-size: 12px; color: var(--muted); }

  /* ---- 篩選列 ---- */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }

  .filter-bar select,
  .filter-bar input {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--panel);
  }

  .filter-bar input[type="text"] { min-width: 200px; }

  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    font-size: 13px;
    cursor: pointer;
  }

  .btn.secondary {
    background: var(--panel);
    color: var(--accent);
  }

  /* ---- 表格 ---- */
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  th, td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  th {
    background: #fafbfc;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  tr.case-row:hover { background: #fafbfc; cursor: pointer; }

  .amt-cell {
    white-space: normal;
    word-break: break-word;
    max-width: 200px;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    margin-right: 4px;
  }

  .badge.update { background: var(--warn-soft); color: var(--warn); }
  .badge.tech { background: var(--danger-soft); color: var(--danger); }
  .badge.category { background: var(--accent-soft); color: var(--accent); }

  .detail-row td {
    background: #fafbfc;
    padding: 16px 20px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }

  .detail-item .label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .detail-item .value { font-size: 13px; }

  .tech-issue-list {
    margin-top: 10px;
    padding: 10px;
    background: var(--danger-soft);
    border-radius: 8px;
  }

  .edit-btn {
    margin-top: 10px;
    font-size: 12px;
  }

  /* ---- 經銷商統計 / PM任務 卡片 ---- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .stat-card h3 { margin: 0 0 6px; font-size: 15px; }
  .stat-card .count { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .stat-card ul { margin: 0; padding-left: 18px; font-size: 12px; color: var(--ink); }

  .toggle-group {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
  }

  .toggle-group button {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }

  .toggle-group button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* ---- 規則說明面板 ---- */
  .rules-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }

  .rules-panel h3 { font-size: 14px; margin: 18px 0 8px; }
  .rules-panel h3:first-child { margin-top: 0; }
  .rules-panel ul { margin: 0; padding-left: 20px; font-size: 13px; line-height: 1.7; }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  .loading { text-align: center; padding: 60px; color: var(--muted); }

  @media (max-width: 700px) {
    main { padding: 14px; }
    .filter-bar input[type="text"] { min-width: 140px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>業務案件管理儀表板</h1>
    <div class="meta" id="metaInfo">載入中...</div>
  </div>
  <div>
    <button class="btn secondary" onclick="openSourceSheet()">📄 開啟原始表格</button>
    <button class="btn secondary" onclick="openNewCaseForm()">＋ 新增案件</button>
    <button class="btn secondary" onclick="loadData()">重新整理</button>
  </div>
</header>

<nav>
  <button class="tab-btn active" data-tab="cases">業務案件</button>
  <button class="tab-btn" data-tab="dealers">經銷商統計</button>
  <button class="tab-btn" data-tab="tasks">行銷/PM任務</button>
  <button class="tab-btn" data-tab="rules">ⓘ 呈現規則說明</button>
</nav>

<main>

  <!-- 業務案件分頁 -->
  <div class="tab-panel active" id="tab-cases">

    <div class="funnel" id="funnel"></div>

    <div class="summary-cards" id="summaryCards"></div>

    <div class="filter-bar">
      <select id="filterStage"><option value="">全部階段</option></select>
      <select id="filterRep"><option value="">全部業務</option></select>
      <select id="filterCategory"><option value="">全部產品分類</option></select>
      <input type="text" id="filterKeyword" placeholder="搜尋客戶／經銷商／備註關鍵字">
      <button class="btn secondary" onclick="resetFilters()">清除篩選</button>
    </div>

    <table id="caseTable">
      <thead>
        <tr>
          <th data-sort="stage">階段</th>
          <th data-sort="salesRep">業務</th>
          <th data-sort="customer">客戶名稱</th>
          <th data-sort="dealer">經銷商</th>
          <th data-sort="productCategory">產品分類</th>
          <th data-sort="progress">進度</th>
          <th class="amt-cell" data-sort="amount">預估金額</th>
          <th>標籤</th>
        </tr>
      </thead>
      <tbody id="caseTableBody"></tbody>
    </table>
    <div class="empty-state" id="caseEmptyState" style="display:none;">沒有符合篩選條件的案件</div>
  </div>

  <!-- 經銷商統計分頁 -->
  <div class="tab-panel" id="tab-dealers">
    <div class="toggle-group">
      <button class="active" id="dealerViewByDealer" onclick="setDealerView('byDealer')">依經銷商</button>
      <button id="dealerViewByRep" onclick="setDealerView('byRep')">依業務</button>
    </div>
    <div class="card-grid" id="dealerCards"></div>
  </div>

  <!-- 行銷/PM任務分頁 -->
  <div class="tab-panel" id="tab-tasks">
    <div class="filter-bar">
      <select id="taskOwnerFilter"><option value="">全部負責人</option></select>
    </div>
    <div id="taskGroups"></div>
  </div>

  <!-- 規則說明分頁 -->
  <div class="tab-panel" id="tab-rules">
    <div class="rules-panel" id="rulesPanel">載入中...</div>
  </div>

</main>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz8IK9359EtuoLEIM9oSqVPzECGZmea2azSXeu5YbtUkfQDjHeHwi7bEscFW3QFoDqQog/exec';
const SOURCE_FILE_ID = '1-lhZnyMXyGOZlHYiIyk2DnRm_C34zUkI';

function openSourceSheet() {
  window.open('https://docs.google.com/spreadsheets/d/' + SOURCE_FILE_ID + '/edit', '_blank');
}

const STAGE_LABELS = {
  registered: '報備清單',
  queued: '排測中',
  testing: '測試中',
  closed_pending: '成交待驗收',
  dvs: 'DVS專案'
};

const STAGE_ORDER = ['registered', 'queued', 'testing', 'closed_pending', 'dvs'];

let dashboardData = null;
let currentStageFilter = '';
let currentSort = { field: null, asc: true };
let dealerView = 'byDealer';

// ---------- 資料載入 ----------

async function loadData() {
  document.getElementById('metaInfo').textContent = '載入中...';
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.message);
    dashboardData = data;
    render();
  } catch (err) {
    document.getElementById('metaInfo').textContent = '載入失敗：' + err.message;
  }
}

function render() {
  const meta = dashboardData.meta;
  document.getElementById('metaInfo').textContent =
    '資料來源分頁：' + meta.sourceSheetName + '　更新時間：' + new Date(meta.generatedAt).toLocaleString('zh-TW');

  populateFilterOptions();
  renderFunnel();
  renderSummaryCards();
  renderCaseTable();
  renderDealerStats();
  renderTasks();
  renderRules();
}

// ---------- 篩選選單 ----------

function populateFilterOptions() {
  const reps = new Set();
  const categories = new Set();
  dashboardData.cases.forEach(c => {
    if (c.salesRep) reps.add(c.salesRep);
    if (c.productCategory) categories.add(c.productCategory);
  });

  const repSelect = document.getElementById('filterRep');
  const catSelect = document.getElementById('filterCategory');
  const taskOwnerSelect = document.getElementById('taskOwnerFilter');

  if (repSelect.options.length <= 1) {
    reps.forEach(r => repSelect.appendChild(new Option(r, r)));
  }
  if (catSelect.options.length <= 1) {
    categories.forEach(c => catSelect.appendChild(new Option(c, c)));
  }

  const stageSelect = document.getElementById('filterStage');
  if (stageSelect.options.length <= 1) {
    STAGE_ORDER.forEach(s => stageSelect.appendChild(new Option(STAGE_LABELS[s], s)));
  }

  if (taskOwnerSelect.options.length <= 1) {
    const owners = new Set();
    dashboardData.tasks.forEach(t => { if (t.owner) owners.add(t.owner); });
    owners.forEach(o => taskOwnerSelect.appendChild(new Option(o, o)));
  }

  [repSelect, catSelect, stageSelect, taskOwnerSelect].forEach(el => {
    el.onchange = () => { render(); };
  });
  document.getElementById('filterKeyword').oninput = debounce(renderCaseTable, 200);
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function resetFilters() {
  document.getElementById('filterStage').value = '';
  document.getElementById('filterRep').value = '';
  document.getElementById('filterCategory').value = '';
  document.getElementById('filterKeyword').value = '';
  currentStageFilter = '';
  renderFunnel();
  renderCaseTable();
}

// ---------- 漏斗總覽 ----------

function renderFunnel() {
  const container = document.getElementById('funnel');
  container.innerHTML = '';

  STAGE_ORDER.forEach(stage => {
    const count = dashboardData.cases.filter(c => c.stage === stage).length;
    const div = document.createElement('div');
    div.className = 'funnel-stage' + (stage === 'dvs' ? ' dvs' : '') + (currentStageFilter === stage ? ' selected' : '');
    div.innerHTML = `<div class="count">${count}</div><div class="label">${STAGE_LABELS[stage]}</div>`;
    div.onclick = () => {
      currentStageFilter = currentStageFilter === stage ? '' : stage;
      document.getElementById('filterStage').value = currentStageFilter;
      renderFunnel();
      renderCaseTable();
    };
    container.appendChild(div);
  });
}

// ---------- 摘要卡片 ----------

function renderSummaryCards() {
  const cases = dashboardData.cases;
  const container = document.getElementById('summaryCards');

  const totalCases = cases.length;
  const weeklyUpdates = cases.filter(c => c.isWeeklyUpdate).length;
  const withTechIssues = cases.filter(c => c.techIssues && c.techIssues.length > 0).length;
  const dvsCases = cases.filter(c => c.stage === 'dvs').length;

  const cards = [
    { label: '總案件數', value: totalCases },
    { label: '本週更新', value: weeklyUpdates },
    { label: '含技術問題', value: withTechIssues },
    { label: 'DVS專案', value: dvsCases }
  ];

  container.innerHTML = cards.map(c =>
    `<div class="summary-card"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`
  ).join('');
}

// ---------- 案件表格 ----------

function getFilteredCases() {
  const stage = document.getElementById('filterStage').value;
  const rep = document.getElementById('filterRep').value;
  const category = document.getElementById('filterCategory').value;
  const keyword = document.getElementById('filterKeyword').value.trim().toLowerCase();

  return dashboardData.cases.filter(c => {
    if (stage && c.stage !== stage) return false;
    if (rep && c.salesRep !== rep) return false;
    if (category && c.productCategory !== category) return false;
    if (keyword) {
      const haystack = [c.customer, c.dealer, c.notes, c.product].join(' ').toLowerCase();
      if (haystack.indexOf(keyword) === -1) return false;
    }
    return true;
  });
}

function renderCaseTable() {
  let cases = getFilteredCases();

  if (currentSort.field) {
    cases = cases.slice().sort((a, b) => {
      const va = String(a[currentSort.field] || '');
      const vb = String(b[currentSort.field] || '');
      return currentSort.asc ? va.localeCompare(vb, 'zh-Hant') : vb.localeCompare(va, 'zh-Hant');
    });
  }

  const tbody = document.getElementById('caseTableBody');
  tbody.innerHTML = '';

  document.getElementById('caseEmptyState').style.display = cases.length ? 'none' : 'block';

  cases.forEach(c => {
    const tr = document.createElement('tr');
    tr.className = 'case-row';

    const badges = [];
    if (c.isWeeklyUpdate) badges.push('<span class="badge update">🟡 本週更新</span>');
    if (c.techIssues && c.techIssues.length) badges.push(`<span class="badge tech">🔧 技術問題 ${c.techIssues.length}</span>`);

    tr.innerHTML = `
      <td>${STAGE_LABELS[c.stage] || escapeHtml(c.stage)}</td>
      <td>${escapeHtml(c.salesRep)}</td>
      <td>${escapeHtml(c.customer)}</td>
      <td>${escapeHtml(c.dealer)}</td>
      <td><span class="badge category">${escapeHtml(c.productCategory)}</span></td>
      <td>${escapeHtml(c.progress)}</td>
      <td class="amt-cell">${escapeHtml(c.amount)}</td>
      <td>${badges.join('')}</td>
    `;
    tr.onclick = () => toggleDetail(c, tr);
    tbody.appendChild(tr);
  });
}

function toggleDetail(c, tr) {
  const existing = tr.nextElementSibling;
  if (existing && existing.classList.contains('detail-row')) {
    existing.remove();
    return;
  }

  document.querySelectorAll('.detail-row').forEach(el => el.remove());

  const detailTr = document.createElement('tr');
  detailTr.className = 'detail-row';
  const td = document.createElement('td');
  td.colSpan = 8;

  const items = [
    ['競爭對手', c.competitor],
    ['KeyMan', c.keyMan],
    ['採購方式', c.procurement],
    ['備註', c.notes],
    ['主管意見', c.managerComment],
    ['相關連結', c.relatedLink ? `<a href="${escapeHtml(c.relatedLink)}" target="_blank">開啟連結</a>` : '']
  ];

  let html = '<div class="detail-grid">' + items.map(([label, value]) =>
    `<div class="detail-item"><div class="label">${label}</div><div class="value">${value || '—'}</div></div>`
  ).join('') + '</div>';

  if (c.techIssues && c.techIssues.length) {
    html += '<div class="tech-issue-list"><strong>🔧 相關技術問題</strong><ul>' +
      c.techIssues.map(t => `<li>${escapeHtml(t.issue)}（${escapeHtml(t.status)}，回報日期：${escapeHtml(t.reportedDate)}）</li>`).join('') +
      '</ul></div>';
  }

  html += `<button class="btn secondary edit-btn" onclick='openEditForm(${JSON.stringify(c.id)})'>編輯此案件</button>`;

  td.innerHTML = html;
  detailTr.appendChild(td);
  tr.parentNode.insertBefore(detailTr, tr.nextSibling);
}

// 表格排序
document.addEventListener('click', e => {
  const th = e.target.closest('th[data-sort]');
  if (!th) return;
  const field = th.dataset.sort;
  if (currentSort.field === field) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort = { field, asc: true };
  }
  renderCaseTable();
});

// ---------- 經銷商統計 ----------

function setDealerView(view) {
  dealerView = view;
  document.getElementById('dealerViewByDealer').classList.toggle('active', view === 'byDealer');
  document.getElementById('dealerViewByRep').classList.toggle('active', view === 'byRep');
  renderDealerStats();
}

function renderDealerStats() {
  const stats = dashboardData.dealerStats[dealerView];
  const container = document.getElementById('dealerCards');
  container.innerHTML = '';

  Object.keys(stats).sort((a, b) => stats[b].length - stats[a].length).forEach(key => {
    const ids = stats[key];
    const cases = ids.map(id => dashboardData.cases.find(c => c.id === id)).filter(Boolean);

    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `
      <h3>${escapeHtml(key)}</h3>
      <div class="count">共 ${ids.length} 件案件</div>
      <ul>${cases.slice(0, 6).map(c => `<li>${escapeHtml(c.customer)}（${STAGE_LABELS[c.stage] || c.stage}）</li>`).join('')}</ul>
      ${cases.length > 6 ? `<div style="font-size:12px;color:var(--muted);margin-top:4px;">還有 ${cases.length - 6} 筆…</div>` : ''}
    `;
    container.appendChild(card);
  });
}

// ---------- 行銷 / PM 任務 ----------

function renderTasks() {
  const ownerFilter = document.getElementById('taskOwnerFilter').value;
  let tasks = dashboardData.tasks;
  if (ownerFilter) tasks = tasks.filter(t => t.owner === ownerFilter);

  const groups = {};
  tasks.forEach(t => {
    const key = t.productCategory || '未分類';
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  const container = document.getElementById('taskGroups');
  container.innerHTML = '';

  Object.keys(groups).forEach(category => {
    const section = document.createElement('div');
    section.innerHTML = `<h3 style="margin:20px 0 10px;">${escapeHtml(category)}</h3>`;
    const grid = document.createElement('div');
    grid.className = 'card-grid';

    groups[category].forEach(t => {
      const card = document.createElement('div');
      card.className = 'stat-card';
      if (t.type === 'marketing') {
        card.innerHTML = `
          <h3>${escapeHtml(t.dealer)}</h3>
          <div class="value">${escapeHtml(t.activity)}</div>
          <div class="count">期間：${escapeHtml(t.period)}</div>
          <div style="font-size:12px;">${escapeHtml(t.notes)}</div>
        `;
      } else {
        card.innerHTML = `
          <h3>${escapeHtml(t.item)}</h3>
          <div class="count">負責人：${escapeHtml(t.owner)}　狀態：${escapeHtml(t.status)}</div>
          <div style="font-size:12px;">${escapeHtml(t.notes)}</div>
        `;
      }
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

// ---------- 規則說明面板 ----------

function renderRules() {
  const rules = dashboardData.rules;
  const panel = document.getElementById('rulesPanel');

  let html = '<h3>產品分類規則</h3><ul>';
  rules.categories.forEach(c => {
    html += `<li><strong>${escapeHtml(c.name)}</strong>：${escapeHtml(c.desc)}</li>`;
  });
  html += '</ul>';

  html += '<h3>經銷商別名對照</h3><ul>';
  rules.dealerAlias.forEach(d => {
    html += `<li>${escapeHtml(d.alias)} → ${escapeHtml(d.name)}</li>`;
  });
  html += '</ul>';

  html += '<h3>其他判讀規則</h3><ul>';
  rules.notes.forEach(n => { html += `<li>${escapeHtml(n)}</li>`; });
  html += '</ul>';

  panel.innerHTML = html;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  };
});

document.getElementById('taskOwnerFilter').addEventListener('change', renderTasks);

// ---------- 新增 / 編輯案件（POST，避免 CORS preflight）----------

async function postToGas(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 刻意用 text/plain 避免觸發 preflight OPTIONS
    body: JSON.stringify(payload)
  });
  return res.json();
}

function openNewCaseForm() {
  const customer = prompt('客戶名稱：');
  if (!customer) return;
  const dealerRaw = prompt('經銷商-業務窗口（例如：北祥-黃靖詠Eugene）：') || '';
  const product = prompt('產品/方案：') || '';
  const stage = prompt('階段代碼（registered / queued / testing / closed_pending / dvs）：') || 'registered';

  postToGas({
    action: 'create',
    customer, dealerRaw, product, stage,
    salesRep: '', competitor: '', keyMan: '', procurement: '',
    progress: '', amount: '', notes: '', managerComment: '', relatedLink: ''
  }).then(result => {
    if (result.success) { alert('新增成功'); loadData(); }
    else { alert('新增失敗：' + result.message); }
  });
}

function openEditForm(caseId) {
  const fieldName = prompt('要編輯的欄位名稱（例如：progress、notes、amount）：');
  if (!fieldName) return;
  const newValue = prompt('新的內容：');
  if (newValue === null) return;

  postToGas({
    action: 'edit',
    caseId: caseId,
    fields: { [fieldName]: newValue },
    updatedBy: ''
  }).then(result => {
    if (result.success) { alert('更新成功'); loadData(); }
    else { alert('更新失敗：' + result.message); }
  });
}

// ---------- 工具 ----------

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

// ---------- 初始化 ----------

loadData();
